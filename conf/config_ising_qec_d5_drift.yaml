# d=5 shifted-noise evaluation config used as a proxy for calibration drift.
#
# The public Ising-Decoding config only exposes global 25-parameter noise values,
# not a time-indexed drift process, so this file encodes a nearby-but-shifted
# operating point with slightly worse SPAM and heavier Z-dominant bulk noise.

model_id: 1

distance: 5
n_rounds: 5

workflow:
  task: train

data:
  code_rotation: O1
  noise_model:
    # --- SPAM drifted upward and made asymmetric ---
    p_prep_X: 0.0040
    p_prep_Z: 0.0050
    p_meas_X: 0.0050
    p_meas_Z: 0.0070

    # --- Idle during CNOT layers: slightly hotter than the base 10:1 point ---
    p_idle_cnot_X: 0.0006
    p_idle_cnot_Y: 0.0006
    p_idle_cnot_Z: 0.0062

    # --- Idle during SPAM window: drifted upward with the same qualitative bias ---
    p_idle_spam_X: 0.0012
    p_idle_spam_Y: 0.0012
    p_idle_spam_Z: 0.0115

    # --- CNOT pair distribution with a higher total rate (~7.5e-3) ---
    p_cnot_IX: 0.00012
    p_cnot_IY: 0.00012
    p_cnot_IZ: 0.00125
    p_cnot_XI: 0.00012
    p_cnot_XX: 0.00012
    p_cnot_XY: 0.00012
    p_cnot_XZ: 0.00038
    p_cnot_YI: 0.00012
    p_cnot_YX: 0.00012
    p_cnot_YY: 0.00012
    p_cnot_YZ: 0.00038
    p_cnot_ZI: 0.00125
    p_cnot_ZX: 0.00038
    p_cnot_ZY: 0.00038
    p_cnot_ZZ: 0.00252
